<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Meetily Improved icon contact sheet</title>
    <style>
      :root { color: #17171a; background: #f2f3f5; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; }
      body { margin: 0; padding: 48px; }
      main { max-width: 960px; margin: auto; }
      h1 { margin: 0; font-size: 30px; letter-spacing: -0.03em; }
      p { color: #62636b; line-height: 1.5; }
      .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-top: 32px; }
      figure { display: grid; place-items: center; gap: 14px; min-height: 190px; margin: 0; padding: 20px; border: 1px solid #d5d6db; border-radius: 10px; background: #fcfcfd; }
      img { image-rendering: auto; }
      figcaption { color: #62636b; font: 600 12px/1.3 ui-monospace, SFMono-Regular, Menlo, monospace; }
      .size-16 { width: 16px; height: 16px; }
      .size-32 { width: 32px; height: 32px; }
      .size-128 { width: 128px; height: 128px; }
      .size-512 { width: 128px; height: 128px; }
    </style>
  </head>
  <body>
    <main>
      <h1>Meetily Improved — Signal Orange icon</h1>
      <p>Original vector master rendered across active desktop sizes.</p>
      <section class="grid" aria-label="Icon sizes">
        <figure><img class="size-16" src="../frontend/src-tauri/icons/icon_16x16.png?v=3" alt="Icon at 16 pixels"><figcaption>16 × 16</figcaption></figure>
        <figure><img class="size-32" src="../frontend/src-tauri/icons/icon_32x32.png?v=3" alt="Icon at 32 pixels"><figcaption>32 × 32</figcaption></figure>
        <figure><img class="size-128" src="../frontend/src-tauri/icons/icon_128x128.png?v=3" alt="Icon at 128 pixels"><figcaption>128 × 128</figcaption></figure>
        <figure><img class="size-512" src="../frontend/src-tauri/icons/icon_512x512.png?v=3" alt="Icon at 512 pixels"><figcaption>512 × 512</figcaption></figure>
      </section>
    </main>
  </body>
</html>
