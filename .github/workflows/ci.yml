name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-core:
    name: Rust core quality
    runs-on: macos-14
    timeout-minutes: 45
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install minimum supported Rust
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Check formatting
        run: cargo +stable fmt --all -- --check

      - name: Build and stage llama-helper sidecar
        run: |
          cargo +1.88.0 build --locked -p llama-helper --features metal
          mkdir -p frontend/src-tauri/binaries
          install -m 755 target/debug/llama-helper \
            frontend/src-tauri/binaries/llama-helper-aarch64-apple-darwin

      - name: Verify minimum supported Rust
        run: cargo +1.88.0 check --locked --workspace --all-targets --features metal

      - name: Run strict Clippy
        run: cargo +stable clippy --locked --workspace --all-targets --features metal -- -D warnings

      - name: Run Rust workspace tests
        run: cargo +stable test --locked --workspace --all-targets --features metal

  rust-dependencies:
    name: Rust dependency policy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Check advisories, licenses, and sources
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: "1.88.0"
          command: check -W unmaintained advisories licenses sources
          arguments: --all-features --locked

  frontend:
    name: Frontend quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.18.0
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm run audit:prod

      - name: Run focused source tests
        run: node --test tests/lib/*.test.mjs

      - name: Run rendered behavior tests
        run: pnpm run test:rendered

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Enforce route bundle budget
        run: pnpm run check:bundle

  native-qa-macos:
    name: Native macOS QA bundle
    needs: [rust-core, rust-dependencies, frontend]
    runs-on: macos-26
    timeout-minutes: 45
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.18.0
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify adaptive icon toolchain
        shell: bash
        run: |
          xcodebuild -version
          xcrun actool --version
          XCODE_MAJOR=$(xcodebuild -version | awk 'NR == 1 { split($2, version, "."); print version[1] }')
          test "$XCODE_MAJOR" -ge 26

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          shared-key: native-qa-macos

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run browser accessibility and visual QA
        working-directory: frontend
        run: pnpm run test:e2e:browser

      - name: Upload browser QA failure evidence
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: browser-qa-failure-${{ github.sha }}
          path: frontend/tests/e2e/artifacts/browser-visual/
          if-no-files-found: ignore
          retention-days: 14

      - name: Build and stage llama-helper sidecar
        run: |
          cargo build --locked -p llama-helper --features metal
          mkdir -p frontend/src-tauri/binaries
          install -m 755 target/debug/llama-helper \
            frontend/src-tauri/binaries/llama-helper-aarch64-apple-darwin

      - name: Build isolated native WebDriver app
        working-directory: frontend
        run: pnpm run tauri:build:wdio

      - name: Run native accessibility and route QA
        id: native-e2e
        working-directory: frontend
        run: pnpm run test:e2e:native

      - name: Upload native QA evidence
        if: ${{ always() && steps.native-e2e.outcome != 'skipped' }}
        uses: actions/upload-artifact@v7
        with:
          name: native-webdriver-evidence-${{ github.sha }}
          path: frontend/tests/e2e/artifacts/native/
          if-no-files-found: error
          retention-days: 14

      - name: Build isolated native QA app
        working-directory: frontend
        run: pnpm run tauri:build:qa

      - name: Verify native bundle identity and signature
        id: bundle
        shell: bash
        run: |
          APP_PATH=$(find target frontend/src-tauri/target \
            -type d -path '*/bundle/macos/Meetily Improved QA Routes.app' \
            -print -quit 2>/dev/null || true)
          test -n "$APP_PATH"
          test -f "$APP_PATH/Contents/Info.plist"
          EXECUTABLE=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' \
            "$APP_PATH/Contents/Info.plist")
          test -x "$APP_PATH/Contents/MacOS/$EXECUTABLE"
          file "$APP_PATH/Contents/MacOS/$EXECUTABLE" | grep -q 'Mach-O 64-bit executable arm64'
          test -f "$APP_PATH/Contents/Resources/Assets.car"
          test -f "$APP_PATH/Contents/Resources/MeetilyImproved.icns"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' \
            "$APP_PATH/Contents/Info.plist")" = "com.meetily.improved.qa.routes"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          FFMPEG_PATH=$(find "$APP_PATH" -type f -name 'ffmpeg*' -print -quit)
          test -n "$FFMPEG_PATH"
          EXPECTED_FFMPEG_SHA=$(jq -r \
            '.assets[] | select(.target == "aarch64-apple-darwin") | .binary_sha256' \
            ffmpeg-build/ffmpeg-assets.json)
          INPUT_FFMPEG=frontend/src-tauri/binaries/ffmpeg-aarch64-apple-darwin
          INPUT_FFMPEG_SHA=$(shasum -a 256 "$INPUT_FFMPEG" | awk '{print $1}')
          test "$INPUT_FFMPEG_SHA" = "$EXPECTED_FFMPEG_SHA"
          PROVENANCE="$RUNNER_TEMP/meetily-ffmpeg-provenance-${GITHUB_SHA}"
          mkdir -p "$PROVENANCE"
          cp ffmpeg-build/ffmpeg-assets.json "$PROVENANCE/ffmpeg-assets.json"
          shasum -a 256 "$INPUT_FFMPEG" > "$PROVENANCE/authenticated-input-sha256.txt"
          shasum -a 256 "$FFMPEG_PATH" > "$PROVENANCE/signed-bundle-sha256.txt"
          ARCHIVE="$RUNNER_TEMP/meetily-improved-qa-routes-${GITHUB_SHA}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ARCHIVE"
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "provenance=$PROVENANCE" >> "$GITHUB_OUTPUT"

      - name: Upload isolated native QA app
        uses: actions/upload-artifact@v7
        with:
          name: meetily-improved-qa-routes-${{ github.sha }}
          path: |
            ${{ steps.bundle.outputs.archive }}
            ${{ steps.bundle.outputs.provenance }}
          if-no-files-found: error
          retention-days: 14
