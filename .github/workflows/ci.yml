name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-core:
    name: Rust core quality
    runs-on: macos-14
    timeout-minutes: 45
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install minimum supported Rust
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Check formatting
        run: cargo +stable fmt --all -- --check

      - name: Verify minimum supported Rust
        run: cargo +1.88.0 check --locked --workspace --all-targets --features metal

      - name: Run strict Clippy
        run: cargo +stable clippy --locked --workspace --all-targets --features metal -- -D warnings

      - name: Run Rust workspace tests
        run: cargo +stable test --locked --workspace --all-targets --features metal

  rust-dependencies:
    name: Rust dependency policy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check advisories, licenses, and sources
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: "1.88.0"
          command: check -W unmaintained advisories licenses sources
          arguments: --all-features --locked

  frontend:
    name: Frontend quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run focused source tests
        run: node --test tests/lib/*.test.mjs

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build
